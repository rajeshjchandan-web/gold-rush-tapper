<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Rush Tapper</title>

<style>

#skins{

    margin-top:20px;

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:10px;
}

.skinBtn{

    padding:12px;

    border:none;

    border-radius:14px;

    font-size:16px;

    font-weight:bold;

    cursor:pointer;

    background:#222;

    color:white;

    box-shadow:0 0 10px rgba(255,255,255,0.2);
}

.skinBtn:hover{

    transform:scale(1.05);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background: linear-gradient(135deg,#0f0f0f,#1f1f1f,#2d2d2d);
    overflow:hidden;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#gameContainer{
    width:100%;
    max-width:420px;
    text-align:center;
    padding:20px;
}

h1{
    font-size:38px;
    margin-bottom:10px;
    color:gold;
    text-shadow:0 0 15px gold;
}

#scoreBox{
    background:rgba(255,255,255,0.08);
    border-radius:20px;
    padding:15px;
    margin-bottom:20px;
    box-shadow:0 0 20px rgba(255,215,0,0.2);
}

#score{
    font-size:42px;
    color:#00ffcc;
    font-weight:bold;
}

#combo{
    margin-top:8px;
    font-size:22px;
    color:#ff66ff;
}

#coin{
    width:220px;
    height:220px;
    margin:auto;
    border-radius:50%;
    background: radial-gradient(circle at top,#ffd700,#ff9900);
    border:10px solid #ffcc00;
    box-shadow:
        0 0 25px gold,
        0 0 60px orange,
        inset 0 0 25px rgba(255,255,255,0.4);

    cursor:pointer;
    transition:transform 0.08s;
    position:relative;
}

#coin::before{
    content:"₹";
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:90px;
    color:white;
    text-shadow:0 0 10px rgba(0,0,0,0.5);
}

#coin:active{
    transform:scale(0.92);
}

.tapEffect{
    position:absolute;
    color:gold;
    font-size:30px;
    font-weight:bold;
    animation:floatUp 1s forwards;
    pointer-events:none;
}

@keyframes floatUp{
    0%{
        opacity:1;
        transform:translateY(0);
    }
    100%{
        opacity:0;
        transform:translateY(-120px);
    }
}

#bottomBar{
    margin-top:25px;
    display:flex;
    justify-content:space-between;
    gap:10px;
}

.gameBtn{
    flex:1;
    padding:14px;
    border:none;
    border-radius:15px;
    background:linear-gradient(45deg,#ffcc00,#ff8800);
    color:black;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(255,165,0,0.4);
}

.gameBtn:hover{
    transform:scale(1.03);
}

#highScore{
    margin-top:18px;
    font-size:18px;
    color:#cccccc;
}


#achievementsPanel{
    margin-top:18px;
    background:rgba(255,255,255,0.08);
    border-radius:18px;
    padding:14px;
    box-shadow:0 0 18px rgba(255,215,0,0.15);
    max-height:150px;
    overflow-y:auto;
}

#achievementsPanel h2{
    font-size:20px;
    color:gold;
    margin-bottom:10px;
}

.achievementItem{
    padding:8px;
    margin:6px 0;
    border-radius:12px;
    background:rgba(0,0,0,0.25);
    font-size:14px;
    color:#ddd;
}

.achievementUnlocked{
    color:#00ffcc;
    box-shadow:0 0 10px rgba(0,255,204,0.25);
}

.achievementToast{
    position:fixed;
    top:18%;
    left:50%;
    transform:translateX(-50%);
    background:linear-gradient(45deg,#ffcc00,#ff8800);
    color:#111;
    padding:14px 22px;
    border-radius:18px;
    font-size:20px;
    font-weight:bold;
    z-index:1000;
    box-shadow:0 0 25px gold;
    animation:achievementPop 2.2s forwards;
}

@keyframes achievementPop{
    0%{opacity:0; transform:translateX(-50%) scale(0.6);}
    20%{opacity:1; transform:translateX(-50%) scale(1.08);}
    80%{opacity:1; transform:translateX(-50%) scale(1);}
    100%{opacity:0; transform:translateX(-50%) scale(0.8);}
}


#spinWheelPanel{
    margin-top:18px;
    background:rgba(255,255,255,0.08);
    border-radius:18px;
    padding:14px;
    box-shadow:0 0 18px rgba(255,215,0,0.15);
}

#wheel{
    width:170px;
    height:170px;
    margin:10px auto;
    border-radius:50%;
    border:8px solid gold;
    background:conic-gradient(
        #ffcc00 0deg 60deg,
        #ff8800 60deg 120deg,
        #00ffcc 120deg 180deg,
        #ff66ff 180deg 240deg,
        #66ccff 240deg 300deg,
        #ff4444 300deg 360deg
    );
    box-shadow:0 0 25px gold, inset 0 0 20px rgba(0,0,0,0.35);
    position:relative;
    transition:transform 3s cubic-bezier(.12,.72,.2,1);
}

#wheel::after{
    content:"🎁";
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:48px;
    background:rgba(0,0,0,0.35);
    width:70px;
    height:70px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
}

#wheelPointer{
    width:0;
    height:0;
    border-left:16px solid transparent;
    border-right:16px solid transparent;
    border-top:28px solid #ffffff;
    margin:0 auto -8px auto;
    filter:drop-shadow(0 0 6px gold);
}

#spinResult{
    margin-top:10px;
    font-size:16px;
    color:#00ffcc;
    font-weight:bold;
}


#dailyRewardPanel{
    margin-top:18px;
    background:linear-gradient(135deg,rgba(255,215,0,0.16),rgba(255,136,0,0.10));
    border:1px solid rgba(255,215,0,0.35);
    border-radius:18px;
    padding:14px;
    box-shadow:0 0 20px rgba(255,215,0,0.18);
}

#dailyRewardPanel h2{
    font-size:20px;
    color:gold;
    margin-bottom:8px;
}

#dailyRewardText{
    font-size:15px;
    color:#eeeeee;
    margin-bottom:10px;
}

#dailyStreak{
    color:#00ffcc;
    font-weight:bold;
}


#musicControls{
    margin-top:18px;
    display:flex;
    gap:10px;
    justify-content:center;
}

.musicBtn{
    padding:12px 18px;
    border:none;
    border-radius:14px;
    background:linear-gradient(45deg,#00ffcc,#0099ff);
    color:#111;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 0 15px rgba(0,255,204,0.3);
}

</style>
</head>

<body>

<div id="gameContainer">

    <h1>Gold Rush</h1>

    <div id="scoreBox">
        <div id="score">0</div>
        <div id="combo">Combo x1</div>
    </div>

    <div id="coin"></div>

    <div id="highScore">
        High Score: <span id="best">0</span>
    </div>

    <div id="bottomBar">

    <button class="gameBtn" onclick="resetGame()">
        Reset
    </button>

    <button class="gameBtn" onclick="boostMode()">
        Boost
    </button>

</div>

<div id="skins">

    <button class="skinBtn" onclick="setSkin('gold')">
        Gold
    </button>

    <button class="skinBtn" onclick="setSkin('diamond')">
        Diamond
    </button>

    <button class="skinBtn" onclick="setSkin('fire')">
        Fire
    </button>

    <button class="skinBtn" onclick="setSkin('neon')">
        Neon
    </button>

</div>




<div id="dailyRewardPanel">
    <h2>🎁 Daily Reward</h2>
    <div id="dailyRewardText">
        Claim your daily bonus and build your streak!
    </div>
    <button class="gameBtn" onclick="claimDailyReward()">
        Claim Daily Reward
    </button>
    <div style="margin-top:10px;">
        Streak: <span id="dailyStreak">0</span> days
    </div>
</div>


<div id="spinWheelPanel">
    <h2>🎡 Lucky Spin</h2>
    <div id="wheelPointer"></div>
    <div id="wheel"></div>
    <button class="gameBtn" onclick="spinWheel()">Spin</button>
    <div id="spinResult">Spin for bonus rewards!</div>
</div>



<div id="musicControls">
    <button class="musicBtn" onclick="toggleMusic()">
        🎵 Music On/Off
    </button>
</div>


<div id="achievementsPanel">
    <h2>🏆 Achievements</h2>
    <div id="achievementsList"></div>
</div>


</div>

<script>

const coinSound = new Audio("coin.mp3");
const boostSound = new Audio("boost.mp3");

const bgMusic = new Audio("background.mp3");

bgMusic.loop = true;
bgMusic.volume = 0.35;

let musicStarted = false;


let score = 0;
let combo = 1;
let streak = 0;
let multiplier = 1;
let lastTap = 0;

let lastDailyClaim = localStorage.getItem("lastDailyClaim") || "";
let dailyStreak = parseInt(localStorage.getItem("dailyStreak") || "0");


let isSpinning = false;
let wheelRotation = 0;

const spinRewards = [
    { label:"+100 Coins", value:100, type:"coins" },
    { label:"+250 Coins", value:250, type:"coins" },
    { label:"Combo Bonus", value:10, type:"combo" },
    { label:"Mini Boost", value:500, type:"coins" },
    { label:"Jackpot +1000", value:1000, type:"coins" },
    { label:"Try Again Bonus +50", value:50, type:"coins" }
];


let highScore = localStorage.getItem("highScore") || 0;

let unlockedAchievements =
    JSON.parse(localStorage.getItem("achievements") || "[]");

const achievements = [
    { id:"firstTap", title:"First Tap", description:"Tap the coin once" },
    { id:"score100", title:"Coin Starter", description:"Reach 100 coins" },
    { id:"score500", title:"Treasure Hunter", description:"Reach 500 coins" },
    { id:"score1500", title:"Gold Master", description:"Reach 1500 coins" },
    { id:"score3000", title:"Legend Tapper", description:"Reach 3000 coins" },
    { id:"combo25", title:"Mega Streak", description:"Reach a 25 tap streak" },
    { id:"combo50", title:"Ultra Fingers", description:"Reach a 50 tap streak" },
    { id:"criticalHit", title:"Lucky Hit", description:"Get a critical hit" },
    { id:"useBoost", title:"Boost Activated", description:"Use boost mode once" }
];


const scoreEl = document.getElementById("score");
const comboEl = document.getElementById("combo");
const coin = document.getElementById("coin");
const bestEl = document.getElementById("best");

bestEl.innerText = highScore;
    checkScoreAchievements();

coin.addEventListener("click",(e)=>{

    startMusicOnce();

    unlockAchievement("firstTap");

    // SOUND
    coinSound.currentTime = 0;
    coinSound.play();

    // MOBILE VIBRATION
    if(navigator.vibrate){
        navigator.vibrate(25);
    }

    // COMBO SYSTEM
    const now = Date.now();

    if(now - lastTap < 500){
        combo++;
        streak++;
    }else{
        combo = 1;
        streak = 0;
    }

    // MULTIPLIER LOGIC
    if(streak > 20){
        multiplier = 5;
    }else if(streak > 10){
        multiplier = 3;
    }else{
        multiplier = 1;
    }

    // RANDOM CRITICAL HIT
    let critical = false;

    if(Math.random() < 0.1){
        critical = true;
    }

    let gain = combo * multiplier;

    if(critical){
        gain *= 5;
        flashScreen();
        screenShake();
        createBigText("CRITICAL!");
        unlockAchievement("criticalHit");
    }

    score += gain;

    // UPDATE SCORE
    if(score > highScore){
        highScore = score;
        localStorage.setItem("highScore",highScore);
    }

    scoreEl.innerText = score;
    comboEl.innerText =
        "Combo x" + combo +
        " | Multiplier x" + multiplier;

    bestEl.innerText = highScore;
    checkScoreAchievements();

    // EFFECTS
    createTapEffect(e,gain);
    createParticles(e.clientX,e.clientY);

    // COIN ANIMATION
    coin.style.transform = "scale(0.9)";

    setTimeout(()=>{
        coin.style.transform = "scale(1)";
    },80);

    // STREAK REWARD
    if(streak === 25){
        createBigText("MEGA STREAK!");
        flashScreen();
        unlockAchievement("combo25");
    }

    if(streak === 50){
        createBigText("ULTRA FINGERS!");
        flashScreen();
        unlockAchievement("combo50");
    }

    lastTap = now;
});

function createTapEffect(e,value){

    const effect = document.createElement("div");

    effect.classList.add("tapEffect");

    effect.innerText = "+" + value;

    document.body.appendChild(effect);

    effect.style.left = e.clientX + "px";
    effect.style.top = e.clientY + "px";

    setTimeout(()=>{
        effect.remove();
    },1000);
}

function createParticles(x,y){

    for(let i=0;i<10;i++){

        const particle = document.createElement("div");

        particle.style.position = "absolute";
        particle.style.width = "10px";
        particle.style.height = "10px";
        particle.style.borderRadius = "50%";
        particle.style.background = "gold";
        particle.style.left = x + "px";
        particle.style.top = y + "px";
        particle.style.pointerEvents = "none";

        document.body.appendChild(particle);

        const angle = Math.random()*360;
        const distance = Math.random()*120;

        particle.animate([
            {
                transform:"translate(0,0)",
                opacity:1
            },
            {
                transform:
                `translate(
                    ${Math.cos(angle)*distance}px,
                    ${Math.sin(angle)*distance}px
                )`,
                opacity:0
            }
        ],{
            duration:700
        });

        setTimeout(()=>{
            particle.remove();
        },700);
    }
}

function screenShake(){

    document.body.animate([
        { transform:"translate(5px,0)" },
        { transform:"translate(-5px,0)" },
        { transform:"translate(0,0)" }
    ],{
        duration:150
    });
}

function flashScreen(){

    const flash = document.createElement("div");

    flash.style.position = "fixed";
    flash.style.top = 0;
    flash.style.left = 0;
    flash.style.width = "100%";
    flash.style.height = "100%";
    flash.style.background = "white";
    flash.style.opacity = "0.4";
    flash.style.pointerEvents = "none";

    document.body.appendChild(flash);

    setTimeout(()=>{
        flash.remove();
    },100);
}

function createBigText(text){

    const big = document.createElement("div");

    big.innerText = text;

    big.style.position = "fixed";
    big.style.top = "40%";
    big.style.left = "50%";
    big.style.transform = "translate(-50%,-50%)";

    big.style.fontSize = "50px";
    big.style.fontWeight = "bold";
    big.style.color = "gold";
    big.style.textShadow = "0 0 20px orange";

    big.style.zIndex = 999;

    document.body.appendChild(big);

    big.animate([
        { opacity:0, transform:"translate(-50%,-50%) scale(0.5)" },
        { opacity:1, transform:"translate(-50%,-50%) scale(1.3)" },
        { opacity:0, transform:"translate(-50%,-50%) scale(2)" }
    ],{
        duration:1000
    });

    setTimeout(()=>{
        big.remove();
    },1000);
}

function resetGame(){

    score = 0;
    combo = 1;
    streak = 0;

    scoreEl.innerText = score;

    comboEl.innerText = "Combo x1";
}

function boostMode(){

    unlockAchievement("useBoost");

    boostSound.currentTime = 0;
    boostSound.play();

    flashScreen();
    createBigText("BOOST MODE!");

    let boost = setInterval(()=>{

        score += 25;

        if(score > highScore){
            highScore = score;
            localStorage.setItem("highScore",highScore);
        }

        scoreEl.innerText = score;
        bestEl.innerText = highScore;

    },100);

    setTimeout(()=>{
        clearInterval(boost);
    },3000);
}


let currentSkin =
    localStorage.getItem("skin") || "gold";

applySkin(currentSkin);

function setSkin(type){

    if(type === "diamond" && highScore < 500){

        alert("Reach 500 score to unlock Diamond!");

        return;
    }

    if(type === "fire" && highScore < 1500){

        alert("Reach 1500 score to unlock Fire!");

        return;
    }

    if(type === "neon" && highScore < 3000){

        alert("Reach 3000 score to unlock Neon!");

        return;
    }

    currentSkin = type;

    localStorage.setItem("skin",type);

    applySkin(type);

    createBigText(type.toUpperCase() + " UNLOCKED!");
}

function applySkin(type){

    if(type === "gold"){

        coin.style.background =
        "radial-gradient(circle at top,#ffd700,#ff9900)";

        coin.style.boxShadow =
        "0 0 25px gold,0 0 60px orange";
    }

    if(type === "diamond"){

        coin.style.background =
        "radial-gradient(circle at top,#00e5ff,#0066ff)";

        coin.style.boxShadow =
        "0 0 25px cyan,0 0 60px blue";
    }

    if(type === "fire"){

        coin.style.background =
        "radial-gradient(circle at top,#ff2200,#ff8800)";

        coin.style.boxShadow =
        "0 0 25px red,0 0 60px orange";
    }

    if(type === "neon"){

        coin.style.background =
        "radial-gradient(circle at top,#39ff14,#00cc66)";

        coin.style.boxShadow =
        "0 0 25px lime,0 0 60px green";
    }
}


function unlockAchievement(id){

    if(unlockedAchievements.includes(id)){
        return;
    }

    unlockedAchievements.push(id);

    localStorage.setItem("achievements",JSON.stringify(unlockedAchievements));

    const achievement = achievements.find(item => item.id === id);

    if(achievement){
        showAchievementToast("🏆 " + achievement.title);
    }

    renderAchievements();
}

function checkScoreAchievements(){

    if(score >= 100){
        unlockAchievement("score100");
    }

    if(score >= 500){
        unlockAchievement("score500");
    }

    if(score >= 1500){
        unlockAchievement("score1500");
    }

    if(score >= 3000){
        unlockAchievement("score3000");
    }
}

function renderAchievements(){

    const list = document.getElementById("achievementsList");

    if(!list){
        return;
    }

    let html = "";

    achievements.forEach(item => {

        const isUnlocked = unlockedAchievements.includes(item.id);

        html += `
            <div class="achievementItem ${isUnlocked ? "achievementUnlocked" : ""}">
                ${isUnlocked ? "✅" : "🔒"} <strong>${item.title}</strong><br>
                <small>${item.description}</small>
            </div>
        `;
    });

    list.innerHTML = html;
}

function showAchievementToast(text){

    const toast = document.createElement("div");

    toast.classList.add("achievementToast");

    toast.innerText = text;

    document.body.appendChild(toast);

    setTimeout(()=>{
        toast.remove();
    },2200);
}

renderAchievements();
checkScoreAchievements();


function spinWheel(){

    if(isSpinning){
        return;
    }

    isSpinning = true;

    const wheel = document.getElementById("wheel");
    const result = document.getElementById("spinResult");

    const rewardIndex = Math.floor(Math.random() * spinRewards.length);
    const reward = spinRewards[rewardIndex];

    const segmentAngle = 360 / spinRewards.length;
    const targetAngle = rewardIndex * segmentAngle + segmentAngle / 2;

    wheelRotation += 1440 + (360 - targetAngle);

    wheel.style.transform = "rotate(" + wheelRotation + "deg)";

    result.innerText = "Spinning...";

    if(boostSound){
        boostSound.currentTime = 0;
        boostSound.play();
    }

    setTimeout(()=>{

        if(reward.type === "coins"){
            score += reward.value;
        }

        if(reward.type === "combo"){
            combo += reward.value;
            score += combo * 20;
        }

        if(score > highScore){
            highScore = score;
            localStorage.setItem("highScore",highScore);
        }

        scoreEl.innerText = score;
        comboEl.innerText = "Combo x" + combo + " | Multiplier x" + multiplier;
        bestEl.innerText = highScore;

        result.innerText = "You won: " + reward.label + "!";
        createBigText("🎁 " + reward.label);
        flashScreen();
        checkScoreAchievements();

        isSpinning = false;

    },3100);
}


function getTodayKey(){

    const today = new Date();

    return today.getFullYear() + "-" +
        String(today.getMonth() + 1).padStart(2,"0") + "-" +
        String(today.getDate()).padStart(2,"0");
}

function getYesterdayKey(){

    const yesterday = new Date();

    yesterday.setDate(yesterday.getDate() - 1);

    return yesterday.getFullYear() + "-" +
        String(yesterday.getMonth() + 1).padStart(2,"0") + "-" +
        String(yesterday.getDate()).padStart(2,"0");
}

function updateDailyRewardUI(){

    const todayKey = getTodayKey();
    const text = document.getElementById("dailyRewardText");
    const streakEl = document.getElementById("dailyStreak");

    if(streakEl){
        streakEl.innerText = dailyStreak;
    }

    if(!text){
        return;
    }

    if(lastDailyClaim === todayKey){
        text.innerText = "Reward already claimed today. Come back tomorrow!";
    }else{
        const reward = 250 + (dailyStreak * 50);
        text.innerText = "Available today: +" + reward + " coins";
    }
}

function claimDailyReward(){

    const todayKey = getTodayKey();
    const yesterdayKey = getYesterdayKey();

    if(lastDailyClaim === todayKey){
        createBigText("COME BACK TOMORROW!");
        return;
    }

    if(lastDailyClaim === yesterdayKey){
        dailyStreak += 1;
    }else{
        dailyStreak = 1;
    }

    const reward = 250 + (dailyStreak * 50);

    score += reward;

    if(score > highScore){
        highScore = score;
        localStorage.setItem("highScore",highScore);
    }

    lastDailyClaim = todayKey;

    localStorage.setItem("lastDailyClaim",lastDailyClaim);
    localStorage.setItem("dailyStreak",dailyStreak);

    scoreEl.innerText = score;
    bestEl.innerText = highScore;

    createBigText("🎁 DAILY +" + reward);
    flashScreen();

    if(navigator.vibrate){
        navigator.vibrate([60,40,60]);
    }

    if(boostSound){
        boostSound.currentTime = 0;
        boostSound.play();
    }

    checkScoreAchievements();
    updateDailyRewardUI();
}

updateDailyRewardUI();


function startMusicOnce(){

    if(musicStarted){
        return;
    }

    bgMusic.play()
    .then(()=>{
        musicStarted = true;
    })
    .catch(()=>{});
}

function toggleMusic(){

    if(bgMusic.paused){

        bgMusic.play();

        createBigText("🎵 MUSIC ON");

    }else{

        bgMusic.pause();

        createBigText("🔇 MUSIC OFF");
    }
}

</script>

</body>
</html>
