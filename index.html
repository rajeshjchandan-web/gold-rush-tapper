<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Rush Tapper</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background: linear-gradient(135deg,#0f0f0f,#1f1f1f,#2d2d2d);
    overflow:hidden;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#gameContainer{
    width:100%;
    max-width:420px;
    text-align:center;
    padding:20px;
}

h1{
    font-size:38px;
    margin-bottom:10px;
    color:gold;
    text-shadow:0 0 15px gold;
}

#scoreBox{
    background:rgba(255,255,255,0.08);
    border-radius:20px;
    padding:15px;
    margin-bottom:20px;
    box-shadow:0 0 20px rgba(255,215,0,0.2);
}

#score{
    font-size:42px;
    color:#00ffcc;
    font-weight:bold;
}

#combo{
    margin-top:8px;
    font-size:22px;
    color:#ff66ff;
}

#coin{
    width:220px;
    height:220px;
    margin:auto;
    border-radius:50%;
    background: radial-gradient(circle at top,#ffd700,#ff9900);
    border:10px solid #ffcc00;
    box-shadow:
        0 0 25px gold,
        0 0 60px orange,
        inset 0 0 25px rgba(255,255,255,0.4);

    cursor:pointer;
    transition:transform 0.08s;
    position:relative;
}

#coin::before{
    content:"₹";
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:90px;
    color:white;
    text-shadow:0 0 10px rgba(0,0,0,0.5);
}

#coin:active{
    transform:scale(0.92);
}

.tapEffect{
    position:absolute;
    color:gold;
    font-size:30px;
    font-weight:bold;
    animation:floatUp 1s forwards;
    pointer-events:none;
}

@keyframes floatUp{
    0%{
        opacity:1;
        transform:translateY(0);
    }
    100%{
        opacity:0;
        transform:translateY(-120px);
    }
}

#bottomBar{
    margin-top:25px;
    display:flex;
    justify-content:space-between;
    gap:10px;
}

.gameBtn{
    flex:1;
    padding:14px;
    border:none;
    border-radius:15px;
    background:linear-gradient(45deg,#ffcc00,#ff8800);
    color:black;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(255,165,0,0.4);
}

.gameBtn:hover{
    transform:scale(1.03);
}

#highScore{
    margin-top:18px;
    font-size:18px;
    color:#cccccc;
}

</style>
</head>

<body>

<div id="gameContainer">

    <h1>Gold Rush</h1>

    <div id="scoreBox">
        <div id="score">0</div>
        <div id="combo">Combo x1</div>
    </div>

    <div id="coin"></div>

    <div id="highScore">
        High Score: <span id="best">0</span>
    </div>

    <div id="bottomBar">
        <button class="gameBtn" onclick="resetGame()">
            Reset
        </button>

        <button class="gameBtn" onclick="boostMode()">
            Boost
        </button>
    </div>

</div>

<script>

const coinSound = new Audio("coin.mp3");
const boostSound = new Audio("boost.mp3");

let score = 0;
let combo = 1;
let streak = 0;
let multiplier = 1;
let lastTap = 0;

let highScore = localStorage.getItem("highScore") || 0;

const scoreEl = document.getElementById("score");
const comboEl = document.getElementById("combo");
const coin = document.getElementById("coin");
const bestEl = document.getElementById("best");

bestEl.innerText = highScore;

coin.addEventListener("click",(e)=>{

    // SOUND
    coinSound.currentTime = 0;
    coinSound.play();

    // MOBILE VIBRATION
    if(navigator.vibrate){
        navigator.vibrate(25);
    }

    // COMBO SYSTEM
    const now = Date.now();

    if(now - lastTap < 500){
        combo++;
        streak++;
    }else{
        combo = 1;
        streak = 0;
    }

    // MULTIPLIER LOGIC
    if(streak > 20){
        multiplier = 5;
    }else if(streak > 10){
        multiplier = 3;
    }else{
        multiplier = 1;
    }

    // RANDOM CRITICAL HIT
    let critical = false;

    if(Math.random() < 0.1){
        critical = true;
    }

    let gain = combo * multiplier;

    if(critical){
        gain *= 5;
        flashScreen();
        screenShake();
        createBigText("CRITICAL!");
    }

    score += gain;

    // UPDATE SCORE
    if(score > highScore){
        highScore = score;
        localStorage.setItem("highScore",highScore);
    }

    scoreEl.innerText = score;
    comboEl.innerText =
        "Combo x" + combo +
        " | Multiplier x" + multiplier;

    bestEl.innerText = highScore;

    // EFFECTS
    createTapEffect(e,gain);
    createParticles(e.clientX,e.clientY);

    // COIN ANIMATION
    coin.style.transform = "scale(0.9)";

    setTimeout(()=>{
        coin.style.transform = "scale(1)";
    },80);

    // STREAK REWARD
    if(streak === 25){
        createBigText("MEGA STREAK!");
        flashScreen();
    }

    lastTap = now;
});

function createTapEffect(e,value){

    const effect = document.createElement("div");

    effect.classList.add("tapEffect");

    effect.innerText = "+" + value;

    document.body.appendChild(effect);

    effect.style.left = e.clientX + "px";
    effect.style.top = e.clientY + "px";

    setTimeout(()=>{
        effect.remove();
    },1000);
}

function createParticles(x,y){

    for(let i=0;i<10;i++){

        const particle = document.createElement("div");

        particle.style.position = "absolute";
        particle.style.width = "10px";
        particle.style.height = "10px";
        particle.style.borderRadius = "50%";
        particle.style.background = "gold";
        particle.style.left = x + "px";
        particle.style.top = y + "px";
        particle.style.pointerEvents = "none";

        document.body.appendChild(particle);

        const angle = Math.random()*360;
        const distance = Math.random()*120;

        particle.animate([
            {
                transform:"translate(0,0)",
                opacity:1
            },
            {
                transform:
                `translate(
                    ${Math.cos(angle)*distance}px,
                    ${Math.sin(angle)*distance}px
                )`,
                opacity:0
            }
        ],{
            duration:700
        });

        setTimeout(()=>{
            particle.remove();
        },700);
    }
}

function screenShake(){

    document.body.animate([
        { transform:"translate(5px,0)" },
        { transform:"translate(-5px,0)" },
        { transform:"translate(0,0)" }
    ],{
        duration:150
    });
}

function flashScreen(){

    const flash = document.createElement("div");

    flash.style.position = "fixed";
    flash.style.top = 0;
    flash.style.left = 0;
    flash.style.width = "100%";
    flash.style.height = "100%";
    flash.style.background = "white";
    flash.style.opacity = "0.4";
    flash.style.pointerEvents = "none";

    document.body.appendChild(flash);

    setTimeout(()=>{
        flash.remove();
    },100);
}

function createBigText(text){

    const big = document.createElement("div");

    big.innerText = text;

    big.style.position = "fixed";
    big.style.top = "40%";
    big.style.left = "50%";
    big.style.transform = "translate(-50%,-50%)";

    big.style.fontSize = "50px";
    big.style.fontWeight = "bold";
    big.style.color = "gold";
    big.style.textShadow = "0 0 20px orange";

    big.style.zIndex = 999;

    document.body.appendChild(big);

    big.animate([
        { opacity:0, transform:"translate(-50%,-50%) scale(0.5)" },
        { opacity:1, transform:"translate(-50%,-50%) scale(1.3)" },
        { opacity:0, transform:"translate(-50%,-50%) scale(2)" }
    ],{
        duration:1000
    });

    setTimeout(()=>{
        big.remove();
    },1000);
}

function resetGame(){

    score = 0;
    combo = 1;
    streak = 0;

    scoreEl.innerText = score;

    comboEl.innerText = "Combo x1";
}

function boostMode(){

    boostSound.currentTime = 0;
    boostSound.play();

    flashScreen();
    createBigText("BOOST MODE!");

    let boost = setInterval(()=>{

        score += 25;

        if(score > highScore){
            highScore = score;
            localStorage.setItem("highScore",highScore);
        }

        scoreEl.innerText = score;
        bestEl.innerText = highScore;

    },100);

    setTimeout(()=>{
        clearInterval(boost);
    },3000);
}

</script>

</body>
</html>
